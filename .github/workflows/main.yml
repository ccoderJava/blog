name: CI

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'yarn'
      - name: Install dependencies and build
        env:
          YARN_ENABLE_IMMUTABLE_INSTALLS: false
        run: |
          yarn install --ignore-engines
          yarn run dist
      - name: Deploy
        run: |
          TEMP_DIR=$(mktemp -d)
          git clone --depth 1 https://ccoderJava:${{ secrets.BLOG_ACCESS_TOKEN }}@github.com/ccoderJava/ccoderJava.github.io.git "$TEMP_DIR"
          cd "$TEMP_DIR"

          rm -rf blog
          mkdir -p blog
          cp -r "$GITHUB_WORKSPACE/dist/"* blog/
          cp "$GITHUB_WORKSPACE/dist/CNAME" . 2>/dev/null || true

          git config user.email "congccoder@gmail.com"
          git config user.name "ccoderJava"
          git add -A
          git diff --staged --quiet || git commit -m "auto deploy from action $(date)"
          git push
